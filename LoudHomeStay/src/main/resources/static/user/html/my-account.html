<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quản lý đặt phòng</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <style>
      :root {
        --primary: #0084ff;
        --primary-light: #e7f3ff;
        --secondary: #65676b;
        --success: #45bd62;
        --danger: #f02849;
        --bg-body: #f0f2f5;
        --sidebar-bg: #ffffff;
        --text-main: #050505;
        --text-muted: #65676b;
        --border-color: #e4e6eb;
        --radius-lg: 16px;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Inter", sans-serif;
      }
      .logo-text {
        font-family: "Outfit", sans-serif;
      }

      body {
        background-color: var(--bg-body);
        color: var(--text-main);
        display: flex;
        min-height: 100vh;
        overflow: hidden;
      }

      /* Sidebar */
      .sidebar {
        width: 280px;
        background: var(--sidebar-bg);
        border-right: 1px solid var(--border-color);
        position: fixed;
        height: 100vh;
        z-index: 1000;
        padding: 30px 15px;
        display: flex;
        flex-direction: column;
      }

      .logo-box {
        padding: 0 15px 40px;
        display: flex;
        align-items: center;
        gap: 12px;
        text-decoration: none;
        color: inherit;
        text-decoration: none !important;
      }

      .logo-icon {
        color: #3570ef;
        font-size: 30px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .logo-text {
        font-size: 24px;
        font-weight: 800;
        color: #3570ef;
      }

      .side-nav {
        list-style: none;
        flex: 1;
      }

      .side-nav a {
        display: flex;
        align-items: center;
        padding: 12px 15px;
        border-radius: 10px;
        color: var(--secondary);
        text-decoration: none;
        font-weight: 500;
        font-size: 14px;
        transition: 0.2s;
        gap: 12px;
        margin-bottom: 4px;
      }

      .side-nav a:hover,
      .side-nav a.active {
        background: var(--primary-light);
        color: var(--primary);
      }

      .logout-btn {
        color: var(--danger) !important;
        margin-top: auto;
      }

      /* Main */
      .main {
        flex: 1;
        margin-left: 280px;
        padding: 30px;
      }

      .main h2 {
        margin-bottom: 20px;
        font-size: 24px;
        font-weight: 600;
        display: inline-block;
      }
    </style>
  </head>

  <body>
    <div class="app-container">
      <!-- Sidebar -->
      <aside class="sidebar">
        <a href="home.html" class="logo-box">
          <div class="logo-icon">
            <i class="fas fa-paper-plane"></i>
          </div>
          <div class="logo-text">LoudBooking</div>
        </a>

        <nav class="side-nav">
          <a href="my-account.html" class="active">
            <i class="fas fa-user"></i>
            Tài khoản
          </a>

          <a href="bill.html">
            <i class="fas fa-shopping-bag"></i>
            Đơn hàng
          </a>

          <a href="chat.html">
            <i class="fas fa-comments"></i>
            Liên hệ
          </a>

          <a
            href="javascript:void(0)"
            onclick="logout()"
            style="color: var(--danger); margin-top: auto"
          >
            <i class="fas fa-sign-out-alt"></i> Đăng xuất
          </a>
        </nav>
      </aside>

      <!-- Main -->
      <div class="main">
        <div
          style="
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
          "
        >
          <div>
            <h2 style="margin-bottom: 5px">Thông tin tài khoản</h2>
            <p style="color: #65676b; margin: 0">
              Quản lý thông tin cá nhân và bảo mật tài khoản
            </p>
          </div>
        </div>

        <div
          style="
            background: #fff;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);

            margin: auto;
          "
        >
          <!-- Header -->
          <div
            style="
              background: linear-gradient(135deg, #0084ff, #4da3ff);
              color: white;
              padding: 20px;
            "
          >
            <div
              style="
                display: flex;
                align-items: center;
                gap: 22px;
                flex-wrap: wrap;
              "
            >
              <!-- Avatar -->
              <div style="position: relative">
                <img
                  id="avatarPreview"
                  src="https://ui-avatars.com/api/?name=User"
                  alt="avatar"
                  style="
                    width: 70px;
                    height: 70px;
                    border-radius: 50%;
                    object-fit: cover;
                    border: 5px solid rgba(255, 255, 255, 0.3);
                    background: white;
                  "
                />
              </div>

              <!-- Info -->
              <div>
                <h3
                  id="welcomeName"
                  style="font-size: 25px; font-weight: 700; margin-bottom: 8px"
                >
                  Xin chào 👋
                </h3>
                <p style="margin: 0; opacity: 0.9; font-size: 15px">
                  Cập nhật thông tin tài khoản của bạn
                </p>
              </div>
            </div>
          </div>

          <!-- Form -->
          <div style="padding: 35px; height: 470px">
            <div class="row">
              <!-- Username -->
              <div class="col-md-6 mb-4">
                <label
                  style="font-weight: 600; margin-bottom: 8px; display: block"
                >
                  <i class="fas fa-user" style="color: #0084ff"></i>
                  Tên tài khoản
                </label>

                <input
                  type="text"
                  id="username"
                  class="form-control"
                  style="
                    height: 48px;
                    border-radius: 12px;
                    border: 1px solid #dfe3e8;
                    padding: 0 15px;
                  "
                />
              </div>

              <!-- Email -->
              <div class="col-md-6 mb-4">
                <label
                  style="font-weight: 600; margin-bottom: 8px; display: block"
                >
                  <i class="fas fa-envelope" style="color: #0084ff"></i>
                  Email
                </label>

                <input
                  type="email"
                  id="email"
                  class="form-control"
                  style="
                    height: 48px;
                    border-radius: 12px;
                    border: 1px solid #dfe3e8;
                    padding: 0 15px;
                  "
                />
              </div>

              <!-- Last Name -->
              <div class="col-md-6 mb-4">
                <label
                  style="font-weight: 600; margin-bottom: 8px; display: block"
                >
                  <i class="fas fa-id-card" style="color: #0084ff"></i>
                  Họ
                </label>

                <input
                  type="text"
                  id="lastName"
                  class="form-control"
                  style="
                    height: 48px;
                    border-radius: 12px;
                    border: 1px solid #dfe3e8;
                    padding: 0 15px;
                  "
                />
              </div>

              <!-- First Name -->
              <div class="col-md-6 mb-4">
                <label
                  style="font-weight: 600; margin-bottom: 8px; display: block"
                >
                  <i class="fas fa-signature" style="color: #0084ff"></i>
                  Tên
                </label>

                <input
                  type="text"
                  id="firstName"
                  class="form-control"
                  style="
                    height: 48px;
                    border-radius: 12px;
                    border: 1px solid #dfe3e8;
                    padding: 0 15px;
                  "
                />
              </div>

              <!-- Phone -->
              <div class="col-md-6 mb-4">
                <label
                  style="font-weight: 600; margin-bottom: 8px; display: block"
                >
                  <i class="fas fa-phone" style="color: #0084ff"></i>
                  Số điện thoại
                </label>

                <input
                  type="text"
                  id="phone"
                  class="form-control"
                  style="
                    height: 48px;
                    border-radius: 12px;
                    border: 1px solid #dfe3e8;
                    padding: 0 15px;
                  "
                />
              </div>

              <!-- Password -->
              <div class="col-md-6 mb-4">
                <label
                  style="font-weight: 600; margin-bottom: 8px; display: block"
                >
                  <i class="fas fa-lock" style="color: #0084ff"></i>
                  Mật khẩu mới
                </label>

                <input
                  type="password"
                  id="newPassword"
                  class="form-control"
                  placeholder="Để trống nếu không đổi"
                  style="
                    height: 48px;
                    border-radius: 12px;
                    border: 1px solid #dfe3e8;
                    padding: 0 15px;
                  "
                  autocomplete="new-password"
                />
              </div>

              <!-- Confirm Password -->
              <div class="col-md-6 mb-2">
                <label
                  style="font-weight: 600; margin-bottom: 8px; display: block"
                >
                  <i class="fas fa-shield-alt" style="color: #0084ff"></i>
                  Xác nhận mật khẩu
                </label>

                <input
                  type="password"
                  id="confirmPassword"
                  class="form-control"
                  style="
                    height: 48px;
                    border-radius: 12px;
                    border: 1px solid #dfe3e8;
                    padding: 0 15px;
                  "
                />
              </div>
            </div>

            <!-- Actions -->
            <div
              style="
                margin-top: 20px;
                display: flex;
                justify-content: flex-end;
                gap: 12px;
              "
            >
              <button
                onclick="saveProfile()"
                style="
                  border: none;
                  background: linear-gradient(135deg, #0084ff, #006be6);
                  color: white;
                  height: 48px;
                  padding: 0 24px;
                  border-radius: 12px;
                  font-weight: 600;
                  cursor: pointer;
                  box-shadow: 0 8px 18px rgba(0, 132, 255, 0.25);
                  margin-top: -80px;
                "
              >
                <i class="fas fa-save"></i>
                Lưu thay đổi
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
      const API_URL = "http://localhost:8080";
      const token = localStorage.getItem("accessToken");

      // preview avatar (frontend tạm)
      const avatarInput = document.getElementById("avatarInput");

      if (avatarInput) {
        avatarInput.addEventListener("change", function (e) {
          const file = e.target.files[0];

          if (file) {
            document.getElementById("avatarPreview").src =
              URL.createObjectURL(file);
          }
        });
      }
      // 🎨 SweetAlert2 Theme
      const ToastSuccess = Swal.mixin({
        toast: true,
        position: "top-end",
        showConfirmButton: false,
        timer: 2200,
        timerProgressBar: true,
        background: "#ffffff",
        color: "#333",
        iconColor: "#22c55e",
      });

      const PopupError = Swal.mixin({
        icon: "error",
        confirmButtonText: "OK",
        confirmButtonColor: "#ef4444",
        background: "#ffffff",
        color: "#111827",
      });

      // Thành công
      function showSuccess(message) {
        ToastSuccess.fire({
          icon: "success",
          title: message,
        });
      }

      // Lỗi
      function showError(message) {
        PopupError.fire({
          title: "Có lỗi xảy ra",
          html: message,
        });
      }

      // Lấy lỗi backend
      function getFirstError(obj) {
        if (!obj) return "Có lỗi xảy ra";
        if (obj.message) return obj.message;
        if (typeof obj === "object") {
          return Object.values(obj)[0];
        }
        return "Có lỗi xảy ra";
      }
      // load profile
      async function loadProfile() {
        try {
          const res = await fetch(`${API_URL}/api/users/me`, {
            headers: {
              Authorization: "Bearer " + token,
            },
          });

          if (!res.ok) {
            showError("Không thể lấy thông tin tài khoản");
            return;
          }

          const user = await res.json();

          document.getElementById("username").value = user.username || "";
          document.getElementById("lastName").value = user.lastName || "";
          document.getElementById("firstName").value = user.firstName || "";
          document.getElementById("email").value = user.email || "";
          document.getElementById("phone").value = user.phone || "";
          document.getElementById("welcomeName").innerText =
            `Xin chào 👋 ${user.lastName || ""} ${user.firstName || ""}`;

          // avatar chữ
          document.getElementById("avatarPreview").src =
            `https://ui-avatars.com/api/?name=${encodeURIComponent(
              user.username,
            )}&background=random`;
        } catch (error) {
          console.error(error);
          showError("Lỗi kết nối server");
        }
      }

      // update profile
      async function saveProfile() {
        const password = document.getElementById("newPassword").value;
        const confirmPassword =
          document.getElementById("confirmPassword").value;

        if (password && password !== confirmPassword) {
          showError("Xác nhận mật khẩu không khớp!");
          return;
        }

        const data = {
          username: document.getElementById("username").value.trim(),
          firstName: document.getElementById("firstName").value.trim(),
          lastName: document.getElementById("lastName").value.trim(),
          email: document.getElementById("email").value.trim(),
          phone: document.getElementById("phone").value.trim(),
        };

        if (password.trim() !== "") {
          data.password = password.trim();
        }

        try {
          const res = await fetch(`${API_URL}/api/users/me`, {
            method: "PUT",
            headers: {
              Authorization: "Bearer " + token,
              "Content-Type": "application/json",
            },
            body: JSON.stringify(data),
          });

          const result = await res.json();

          if (!res.ok) {
            showError(getFirstError(result));
            return;
          }

          showSuccess("Cập nhật thành công!");

          document.getElementById("newPassword").value = "";
          document.getElementById("confirmPassword").value = "";

          localStorage.setItem("username", data.username);

          loadProfile();
        } catch (error) {
          console.error(error);
          showError("Lỗi kết nối server");
        }
      }

      document.addEventListener("DOMContentLoaded", loadProfile);
      function logout() {
        localStorage.clear();
        window.location.href = "/login.html";
      }
    </script>
  </body>
</html>
