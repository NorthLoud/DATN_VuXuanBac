<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Messenger - LoudHomeStay</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
      :root {
        --primary: #0084ff;
        --primary-light: #e7f3ff;
        --secondary: #65676b;
        --success: #45bd62;
        --danger: #f02849;
        --bg-body: #f0f2f5;
        --sidebar-bg: #ffffff;
        --text-main: #050505;
        --text-muted: #65676b;
        --border-color: #e4e6eb;
        --radius-lg: 16px;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Inter", sans-serif;
      }

      .logo-text {
        font-family: "Outfit", sans-serif;
      }

      body {
        background-color: var(--bg-body);
        color: var(--text-main);
        display: flex;
        min-height: 100vh;
        overflow: hidden;
      }

      /* Sidebar */
      .sidebar {
        width: 280px;
        min-width: 280px;
        background: var(--sidebar-bg);
        border-right: 1px solid var(--border-color);
        position: fixed;
        top: 0;
        left: 0;
        height: 100vh; /* Cố định chiều cao */
        z-index: 1000;
        padding: 30px 15px;
        display: flex;
        flex-direction: column;
        justify-content: space-between; /* Đảm bảo các mục không bị co giãn */
      }

      .logo-box {
        padding: 0 15px 40px;
        display: flex;
        align-items: center;
        gap: 12px;
        text-decoration: none;
        color: inherit;
        text-decoration: none !important;
      }

      .logo-icon {
        color: #3570ef;
        font-size: 30px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .logo-text {
        font-size: 24px;
        font-weight: 800;
        color: #3570ef;
      }

      .side-nav {
        list-style: none;
        flex: 1;
      }

      .side-nav a {
        display: flex;
        align-items: center;
        padding: 12px 15px;
        border-radius: 10px;
        color: var(--secondary);
        text-decoration: none;
        font-weight: 500;
        font-size: 14px;
        transition: 0.2s;
        gap: 12px;
        margin-bottom: 4px;
      }

      .side-nav a:hover,
      .side-nav a.active {
        background: var(--primary-light);
        color: var(--primary);
      }

      /* Main Content */
      .main-wrapper {
        flex: 1;
        margin-left: 280px;
        height: 100vh; /* Cố định chiều cao */
        overflow-y: auto;
        display: flex;
        flex-direction: column;
      }

      .chat-container {
        flex: 1;
        display: flex;
        background: #fff;
        margin: 20px;
        border-radius: var(--radius-lg);
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        border: 1px solid var(--border-color);
        overflow: hidden;
      }

      .chat-list {
        width: 360px;
        border-right: 1px solid var(--border-color);
        display: flex;
        flex-direction: column;
        background: #fff;
      }

      .chat-list-header {
        padding: 20px;
        font-weight: 800;
        font-size: 24px;
        border-bottom: 1px solid var(--border-color);
      }

      .chat-partners {
        flex: 1;
        overflow-y: auto;
        padding: 8px;
      }

      .chat-item {
        padding: 12px;
        display: flex;
        align-items: center;
        gap: 12px;
        cursor: pointer;
        transition: 0.2s;
        border-radius: 12px;
        margin-bottom: 4px;
      }

      .chat-item:hover {
        background: #f2f2f2;
      }
      .chat-item.active {
        background: #ebf5ff;
      }

      .chat-item img {
        width: 56px;
        height: 56px;
        border-radius: 50%;
        object-fit: cover;
      }

      .chat-item-info {
        flex: 1;
        min-width: 0;
      }
      .chat-item-name {
        font-weight: 600;
        font-size: 15px;
        margin-bottom: 2px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .chat-item-last {
        font-size: 13px;
        color: var(--text-muted);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .chat-item-meta {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 8px;
        margin-left: 10px;
      }

      .chat-item-time {
        font-size: 11px;
        color: var(--text-muted);
        white-space: nowrap;
      }

      .unread-dot {
        width: 12px;
        height: 12px;
        background: var(--primary);
        border-radius: 50%;
      }

      .chat-window {
        flex: 1;
        display: flex;
        flex-direction: column;
        background: #fff;
      }

      .chat-header {
        padding: 10px 20px;
        border-bottom: 1px solid var(--border-color);
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .chat-header img {
        width: 40px;
        height: 40px;
        border-radius: 50%;
      }

      .chat-messages {
        flex: 1;
        padding: 20px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .message-row {
        display: flex;
        gap: 10px;
        margin-bottom: 5px;
      }
      .message-row.me {
        justify-content: flex-end;
      }
      .message-row.other {
        justify-content: flex-start;
      }

      .msg-avatar {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        align-self: flex-end;
      }

      .message-wrapper {
        display: flex;
        flex-direction: column;
        max-width: 70%;
        position: relative;
      }

      .me .message-wrapper {
        align-items: flex-end;
      }
      .other .message-wrapper {
        align-items: flex-start;
      }

      .msg-reply-line {
        font-size: 11px;
        color: var(--text-muted);
        display: flex;
        align-items: center;
        gap: 4px;
        margin-bottom: 2px;
        opacity: 0.8;
      }
      .msg-reply-line i {
        transform: scaleX(-1);
        font-size: 10px;
      }

      .msg-quoted-content {
        font-size: 13px;
        color: var(--text-muted);
        background: #f0f2f5;
        padding: 8px 12px;
        border-radius: 14px;
        margin-bottom: -12px;
        padding-bottom: 20px;
        opacity: 0.8;
        max-width: 100%;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        cursor: pointer;
        border-left: 3px solid var(--primary);
        position: relative;
        z-index: 1;
      }

      .msg-bubble {
        padding: 8px 12px;
        border-radius: 18px;
        font-size: 15px;
        line-height: 1.4;
        word-break: break-word;
        position: relative;
        z-index: 2;
      }

      .me .msg-bubble {
        background: var(--primary);
        color: #fff;
      }
      .other .msg-bubble {
        background: #e4e6eb;
        color: var(--text-main);
      }

      .msg-images {
        margin-top: 4px;
        width: 180px;
        border-radius: 12px;
        overflow: hidden;
        cursor: pointer;
        position: relative;
        border: 1px solid var(--border-color);
      }
      .msg-images img {
        width: 100%;
        height: 180px;
        object-fit: cover;
      }

      .image-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.4);
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
        font-weight: 700;
        z-index: 5;
      }

      .image-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.4);
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
        font-weight: 700;
      }

      .msg-actions {
        display: none;
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        gap: 5px;
        height: 100%;
        align-items: center;
        z-index: 10;
      }
      .me .msg-actions {
        right: 100%;
        padding-right: 15px;
      }
      .other .msg-actions {
        left: 100%;
        padding-left: 15px;
      }
      .message-wrapper:hover .msg-actions {
        display: flex;
      }

      .action-item {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: #fff;
        border: 1px solid var(--border-color);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        color: var(--secondary);
        cursor: pointer;
      }
      .action-item:hover {
        color: var(--primary);
      }

      .msg-status {
        font-size: 11px;
        color: var(--text-muted);
        margin-top: 2px;
      }

      .msg-time-separator {
        text-align: center;
        font-size: 12px;
        color: var(--text-muted);
        margin: 20px 0 10px;
        font-weight: 600;
      }

      .chat-input-container {
        padding: 10px 15px;
        border-top: 1px solid var(--border-color);
        position: relative;
      }

      #replyBar {
        display: none;
        padding: 8px 15px;
        background: #fff;
        border-top: 1px solid var(--border-color);
        align-items: center;
        justify-content: space-between;
        font-size: 13px;
      }

      .chat-input-wrapper {
        display: flex;
        align-items: center;
        gap: 8px;
        background: #f0f2f5;
        padding: 8px 12px;
        border-radius: 20px;
      }
      .chat-input-wrapper input {
        flex: 1;
        border: none;
        background: transparent;
        outline: none;
        font-size: 15px;
      }

      .icon-btn {
        width: 32px;
        height: 32px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--primary);
        font-size: 20px;
        cursor: pointer;
        position: relative;
        overflow: hidden;
        border-radius: 50%;
      }

      /* Gallery Overlay */
      .gallery-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.95);
        z-index: 9999;
        align-items: center;
        justify-content: center;
      }

      .gallery-content {
        position: relative;
        width: 95%;
        height: 95%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      .gallery-main {
        position: relative;
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        min-height: 0;
      }

      .gallery-main-img {
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
        border-radius: 8px;
      }

      .gallery-thumbs {
        display: flex;
        gap: 10px;
        padding: 20px;
        overflow-x: auto;
        width: 100%;
        justify-content: center;
      }

      .gallery-thumbs img {
        width: 80px;
        height: 60px;
        object-fit: cover;
        border-radius: 6px;
        cursor: pointer;
        opacity: 0.5;
        transition: 0.3s;
      }

      .gallery-thumbs img.active {
        opacity: 1;
        border: 2px solid var(--primary);
      }

      .gallery-overlay .close {
        position: absolute;
        top: 20px;
        right: 30px;
        color: white;
        font-size: 50px;
        cursor: pointer;
        z-index: 10001;
      }

      .g-nav {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        background: rgba(255, 255, 255, 0.1);
        border: none;
        color: white;
        width: 60px;
        height: 60px;
        border-radius: 50%;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
        z-index: 10000;
      }

      .g-nav.prev {
        left: 20px;
      }

      .g-nav.next {
        right: 20px;
      }
      .msg-time-separator {
        text-align: center;
        font-size: 12px;
        color: var(--text-muted);
        margin: 20px 0 10px;
        font-weight: 600;
      }
    </style>
  </head>

  <body>
    <aside class="sidebar">
      <a href="home.html" class="logo-box">
        <div class="logo-icon">
          <i class="fas fa-paper-plane"></i>
        </div>
        <div class="logo-text">LoudBooking</div>
      </a>
      <nav class="side-nav">
        <a href="my-account.html"><i class="fas fa-user"></i> Tài khoản</a>
        <a href="bill.html"><i class="fas fa-shopping-bag"></i> Đơn hàng</a>
        <a href="chat.html" class="active"
          ><i class="fas fa-comments"></i> Liên hệ</a
        >
        <a
          href="javascript:void(0)"
          onclick="logout()"
          style="color: var(--danger); margin-top: auto"
        >
          <i class="fas fa-sign-out-alt"></i> Đăng xuất
        </a>
      </nav>
    </aside>

    <div class="main-wrapper">
      <div class="chat-container">
        <div class="chat-list">
          <div class="chat-list-header">Đoạn chat</div>
          <div class="chat-partners" id="partnerList"></div>
        </div>

        <div class="chat-window">
          <div class="chat-header" id="chatHeader" style="display: none">
            <img id="activePartnerAvatar" src="" alt="" />
            <div class="chat-header-info">
              <h4
                id="activePartnerName"
                style="font-weight: 600; font-size: 20px; margin: 0"
              ></h4>
            </div>
          </div>

          <div class="chat-messages" id="messageList">
            <div
              style="
                flex: 1;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                color: var(--text-muted);
                text-align: center;
              "
            >
              <i
                class="fab fa-facebook-messenger"
                style="font-size: 80px; color: #f0f2f5; margin-bottom: 20px"
              ></i>
              <h5 style="font-weight: 700">Chọn một khách sạn để nhắn tin</h5>
            </div>
          </div>

          <div
            class="chat-input-container"
            id="inputContainer"
            style="display: none"
          >
            <div id="replyBar">
              <div
                style="
                  flex: 1;
                  border-left: 2px solid var(--primary);
                  padding-left: 10px;
                "
              >
                <b id="replyToUser"></b>
                <span
                  id="replyToText"
                  style="
                    display: block;
                    color: var(--text-muted);
                    white-space: nowrap;
                    overflow: hidden;
                    text-overflow: ellipsis;
                  "
                ></span>
              </div>
              <div
                onclick="cancelReply()"
                style="cursor: pointer; font-size: 20px"
              >
                &times;
              </div>
            </div>

            <div
              id="previewImages"
              style="display: flex; gap: 6px; margin-bottom: 8px"
            ></div>
            <div class="chat-input-wrapper">
              <div class="icon-btn" title="Gửi ảnh">
                <i class="fas fa-image"></i>
                <input
                  type="file"
                  id="fileInput"
                  multiple
                  accept="image/*"
                  style="position: absolute; opacity: 0; cursor: pointer"
                />
              </div>
              <input type="text" id="chatInput" placeholder="Aa" />
              <div class="icon-btn" id="sendBtn">
                <i class="fas fa-paper-plane"></i>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="previewGallery" class="gallery-overlay">
      <div class="gallery-content">
        <span class="close" onclick="closePreviewGallery()">&times;</span>
        <div class="gallery-main">
          <img id="previewMainImage" class="gallery-main-img" src="" />
          <button class="g-nav prev" onclick="changePreviewSlide(-1)">
            <i class="fas fa-chevron-left"></i>
          </button>
          <button class="g-nav next" onclick="changePreviewSlide(1)">
            <i class="fas fa-chevron-right"></i>
          </button>
        </div>
        <div class="gallery-thumbs" id="previewThumbs"></div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
    <script>
      const API_BASE = "/api/chat";
      const token = localStorage.getItem("accessToken");
      let myId = null,
        activePartnerId = null,
        activeHotelId = null,
        stompClient = null;
      let pendingFiles = [],
        allConversationImages = [],
        previewIdx = 0,
        replyToId = null;

      let hasInitializedChat = false;
      let hasOpenedFromUrl = false;

      document.addEventListener("DOMContentLoaded", () => {
        if (!token) {
          window.location.href = "/login.html";
          return;
        }
        myId = getMyId();
        loadPartners();
        connectSocket();
      });

      function getMyId() {
        try {
          const p = JSON.parse(atob(token.split(".")[1]));
          return p.userId || p.id;
        } catch (e) {
          return null;
        }
      }

      async function loadPartners() {
        const res = await fetch(`${API_BASE}/partners`, {
          headers: { Authorization: `Bearer ${token}` },
        });
        const partners = await res.json();
        renderPartners(partners);

        // Chỉ mở chat từ URL đúng 1 lần
        if (hasOpenedFromUrl) return;
        hasOpenedFromUrl = true;

        const urlParams = new URLSearchParams(window.location.search);
        const mId = urlParams.get("managerId");
        const hId = urlParams.get("hotelId");

        if (mId) {
          const p = partners.find((x) => x.userId == mId && x.hotelId == hId);
          if (p) {
            selectPartner(
              p.userId,
              p.hotelName || p.fullName,
              p.hotelId,
              p.hotelImage,
            );
          } else {
            // Trường hợp mới: Lấy thông tin partner từ API vừa thêm
            try {
              const pRes = await fetch(`${API_BASE}/partner/${mId}`, {
                headers: { Authorization: `Bearer ${token}` },
              });
              const partner = await pRes.json();
              if (partner) {
                selectPartner(
                  partner.userId,
                  partner.hotelName || partner.fullName,
                  partner.hotelId || hId,
                  partner.hotelImage || partner.mainImage,
                );
              }
            } catch (e) {
              console.error("Không thể lấy thông tin partner", e);
            }
          }
        } else if (hId) {
          const p = partners.find((x) => x.hotelId == hId);
          if (p) {
            selectPartner(
              p.userId,
              p.hotelName || p.fullName,
              p.hotelId,
              p.hotelImage,
            );
          } else {
            try {
              const hRes = await fetch(`/api/hotels/${hId}`);
              const hotel = await hRes.json();
              if (hotel && hotel.manager) {
                selectPartner(
                  hotel.manager.userId,
                  hotel.hotelName,
                  hotel.hotelId,
                  hotel.mainImage,
                );
              }
            } catch (e) {
              console.error("Không thể lấy thông tin khách sạn", e);
            }
          }
        }
      }

      function renderPartners(partners) {
        const list = document.getElementById("partnerList");
        list.innerHTML = "";
        partners.forEach((p) => {
          const isUnread = p.unreadCount > 0;
          const div = document.createElement("div");
          div.className = `chat-item ${isUnread ? "unread" : ""} ${p.hotelId == activeHotelId ? "active" : ""}`;
          div.onclick = () =>
            selectPartner(
              p.userId,
              p.hotelName || p.fullName,
              p.hotelId,
              p.hotelImage,
            );

          const imgSrc =
            p.hotelImage ||
            `https://ui-avatars.com/api/?name=${encodeURIComponent(p.fullName)}&background=random`;

          div.innerHTML = `
            <img src="${imgSrc}" alt="">
            <div class="chat-item-info">
              <div class="chat-item-name">${p.fullName}</div>
              <div class="chat-item-last">${p.lastMessage || "Bắt đầu trò chuyện"}</div>
            </div>
            <div class="chat-item-meta">
              <div class="chat-item-time">${getRelativeTime(p.lastMessageAt)}</div>
              ${isUnread ? `<div class="unread-dot"></div>` : ""}
            </div>
          `;
          list.appendChild(div);
        });
      }

      function getRelativeTime(dateStr) {
        if (!dateStr) return "";
        const date = new Date(dateStr);
        const now = new Date();
        const diff = Math.floor((now - date) / 1000);

        if (diff < 60) return "Vừa xong";
        if (diff < 3600) return `${Math.floor(diff / 60)} phút trước`;
        if (diff < 86400) return `${Math.floor(diff / 3600)} giờ trước`;
        if (diff < 604800) return `${Math.floor(diff / 86400)} ngày trước`;

        return date.toLocaleDateString("vi-VN");
      }

      async function selectPartner(
        partnerId,
        partnerName,
        hotelId,
        hotelImage = null,
      ) {
        // Khi user tự chọn chat khác thì xóa params tư vấn khỏi URL
        const url = new URL(window.location);
        url.searchParams.delete("managerId");
        url.searchParams.delete("hotelId");
        window.history.replaceState({}, "", url);

        activePartnerId = partnerId;
        activeHotelId = hotelId;

        document.getElementById("chatHeader").style.display = "flex";
        document.getElementById("inputContainer").style.display = "block";

        document.getElementById("activePartnerName").textContent = partnerName;

        let avatar = hotelImage;

        if (!avatar) {
          const partnersRes = await fetch(`${API_BASE}/partners`, {
            headers: { Authorization: `Bearer ${token}` },
          });

          const partners = await partnersRes.json();

          const currentPartner = partners.find(
            (p) => p.userId == partnerId && p.hotelId == hotelId,
          );

          avatar = currentPartner?.hotelImage;
        }

        document.getElementById("activePartnerAvatar").src =
          avatar ||
          `https://ui-avatars.com/api/?name=${encodeURIComponent(partnerName)}&background=random`;

        if (partnerId) {
          await loadMessages(partnerId);
          await markAsRead(partnerId);
        }
        const res = await fetch(`${API_BASE}/partners`, {
          headers: { Authorization: `Bearer ${token}` },
        });
        const partners = await res.json();
        renderPartners(partners);
        cancelReply();
      }

      async function loadMessages(partnerId) {
        const res = await fetch(`${API_BASE}/messages/${partnerId}`, {
          headers: { Authorization: `Bearer ${token}` },
        });
        const messages = await res.json();
        renderMessages(messages);
      }

      function renderMessages(messages) {
        const list = document.getElementById("messageList");
        list.innerHTML = "";
        allConversationImages = [];
        const filtered = messages.filter((m) => m.hotelId == activeHotelId);
        const partnerName =
          document.getElementById("activePartnerName").textContent;

        let lastTime = null;
        filtered.forEach((m, index) => {
          const isLast = index === filtered.length - 1;
          const mTime = new Date(m.createdAt);
          if (!lastTime || mTime - lastTime > 15 * 60 * 1000) {
            const timeDiv = document.createElement("div");
            timeDiv.className = "msg-time-separator";
            timeDiv.textContent = `${mTime.getHours().toString().padStart(2, "0")}:${mTime.getMinutes().toString().padStart(2, "0")} ${mTime.getDate().toString().padStart(2, "0")}/${(mTime.getMonth() + 1).toString().padStart(2, "0")}/${mTime.getFullYear()}`;
            list.appendChild(timeDiv);
          }
          lastTime = mTime;

          const isMe = m.senderId == myId;
          const row = document.createElement("div");
          row.className = `message-row ${isMe ? "me" : "other"}`;

          let replyLineHtml = "",
            quotedMsgHtml = "";
          if (m.replyToId) {
            const replierName = isMe ? "Bạn" : partnerName;
            replyLineHtml = `<div class="msg-reply-line"><i class="fas fa-reply"></i> ${replierName} đã trả lời</div>`;
            quotedMsgHtml = `<div class="msg-quoted-content" onclick="scrollToMessage(${m.replyToId})">${m.replyToContent || "Hình ảnh"}</div>`;
          }

          let imagesHtml = "";
          if (m.images && m.images.length > 0) {
            imagesHtml = renderImageGrid(m.images);
            allConversationImages.push(...m.images);
          }

          const currentSenderName = isMe ? "Bạn" : partnerName;
          const msgText =
            m.content || (m.images && m.images.length > 0 ? "[Hình ảnh]" : "");

          row.innerHTML = `
            ${!isMe ? `<img src="${document.getElementById("activePartnerAvatar").src}" class="msg-avatar">` : ""}
            <div class="message-wrapper" id="msg-${m.chatId}">
              ${replyLineHtml}
              ${quotedMsgHtml}
              <div class="msg-bubble">
                ${m.isDeleted ? '<i style="color:rgba(0,0,0,0.3)">Tin nhắn đã bị gỡ</i>' : m.content || ""}
                ${imagesHtml}
                <div class="msg-actions">
                  <div class="action-item" onclick="startReply(${m.chatId}, '${currentSenderName}', '${msgText.replace(/'/g, "\\'")}')" title="Trả lời"><i class="fas fa-reply"></i></div>
                  ${isMe && !m.isDeleted ? `<div class="action-item" onclick="deleteMsg(${m.chatId})" title="Gỡ"><i class="fas fa-trash"></i></div>` : ""}
                </div>
              </div>
              <div class="msg-status">
                ${isMe && isLast ? `${mTime.getHours().toString().padStart(2, "0")}:${mTime.getMinutes().toString().padStart(2, "0")} • ${m.isRead ? "Đã xem" : "Đã gửi"}` : ""}
              </div>
            </div>
          `;
          list.appendChild(row);
        });
        list.scrollTop = list.scrollHeight;
      }

      function renderImageGrid(images) {
        const count = images.length;
        return `<div class="msg-images" onclick="openPreviewGallery('${images[0]}')" style="position: relative;">
                <img src="${images[0]}">
                ${count > 1 ? `<div class="image-overlay">+${count - 1}</div>` : ""}
              </div>`;
      }

      function scrollToMessage(id) {
        const el = document.getElementById(`msg-${id}`);
        if (el) {
          el.scrollIntoView({ behavior: "smooth", block: "center" });
          el.style.backgroundColor = "#fff9c4";
          setTimeout(() => (el.style.backgroundColor = "transparent"), 2000);
        }
      }

      function startReply(id, user, text) {
        replyToId = id;
        document.getElementById("replyToUser").textContent =
          `Đang trả lời ${user}`;
        document.getElementById("replyToText").textContent = text;
        document.getElementById("replyBar").style.display = "flex";
        document.getElementById("chatInput").focus();
      }

      function cancelReply() {
        replyToId = null;
        document.getElementById("replyBar").style.display = "none";
      }

      async function sendMessage() {
        const content = document.getElementById("chatInput").value.trim();
        if (!content && pendingFiles.length === 0) return;
        let urls = [];
        if (pendingFiles.length > 0) {
          const fd = new FormData();
          pendingFiles.forEach((f) => fd.append("files", f));
          const res = await fetch(`${API_BASE}/upload`, {
            method: "POST",
            headers: { Authorization: `Bearer ${token}` },
            body: fd,
          });
          urls = await res.json();
        }
        await fetch(`${API_BASE}/send`, {
          method: "POST",
          headers: {
            Authorization: `Bearer ${token}`,
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            recipientId: activePartnerId,
            hotelId: activeHotelId,
            content: content,
            images: urls,
            replyToId: replyToId,
          }),
        });
        document.getElementById("chatInput").value = "";
        pendingFiles = [];
        renderPreview();
        cancelReply();
        loadMessages(activePartnerId);
        loadPartners();
      }

      function renderPreview() {
        const container = document.getElementById("previewImages");
        container.innerHTML = "";
        pendingFiles.forEach((file, index) => {
          const div = document.createElement("div");
          div.style =
            "position:relative; width:60px; height:60px; border-radius:8px; overflow:hidden;";
          div.innerHTML = `<img src="${URL.createObjectURL(file)}" style="width:100%; height:100%; object-fit:cover;"><div onclick="pendingFiles.splice(${index}, 1); renderPreview()" style="position:absolute; top:2px; right:2px; background:#fff; border-radius:50%; width:18px; height:18px; display:flex; align-items:center; justify-content:center; cursor:pointer;">×</div>`;
          container.appendChild(div);
        });
      }

      async function deleteMsg(chatId) {
        if (confirm("Gỡ tin nhắn này?")) {
          await fetch(`${API_BASE}/delete/${chatId}`, {
            method: "DELETE",
            headers: { Authorization: `Bearer ${token}` },
          });
          loadMessages(activePartnerId);
        }
      }

      function openPreviewGallery(url) {
        previewIdx = allConversationImages.findIndex(
          (img) => img === url || img.endsWith(url) || url.endsWith(img),
        );
        if (previewIdx === -1) previewIdx = 0;
        document.getElementById("previewGallery").style.display = "flex";
        renderPreviewGallery();
      }

      function renderPreviewGallery() {
        const thumbs = document.getElementById("previewThumbs");
        thumbs.innerHTML = "";
        allConversationImages.forEach((img, index) => {
          const el = document.createElement("img");
          el.src = img;
          el.className = index === previewIdx ? "active" : "";
          el.onclick = () => {
            previewIdx = index;
            updateMainImage();
          };
          thumbs.appendChild(el);
        });
        updateMainImage();
      }

      function updateMainImage() {
        document.getElementById("previewMainImage").src =
          allConversationImages[previewIdx];
        const thumbs = document.getElementById("previewThumbs").children;
        [...thumbs].forEach((t, i) =>
          t.classList.toggle("active", i === previewIdx),
        );
      }

      function changePreviewSlide(step) {
        previewIdx =
          (previewIdx + step + allConversationImages.length) %
          allConversationImages.length;
        updateMainImage();
      }
      function closePreviewGallery() {
        document.getElementById("previewGallery").style.display = "none";
      }
      async function markAsRead(pId) {
        await fetch(`${API_BASE}/read/${pId}`, {
          method: "POST",
          headers: { Authorization: `Bearer ${token}` },
        });
      }

      function connectSocket() {
        const socket = new SockJS("/chat-socket");
        stompClient = Stomp.over(socket);
        stompClient.debug = null;
        stompClient.connect({}, () => {
          stompClient.subscribe(`/topic/chat/${myId}`, async () => {
            if (activePartnerId) {
              await loadMessages(activePartnerId);
            }

            const res = await fetch(`${API_BASE}/partners`, {
              headers: { Authorization: `Bearer ${token}` },
            });

            const partners = await res.json();
            renderPartners(partners);
          });
        });
      }

      document.getElementById("chatInput").onkeypress = (e) => {
        if (e.key === "Enter") sendMessage();
      };
      document.getElementById("sendBtn").onclick = sendMessage;
      document.getElementById("fileInput").onchange = (e) => {
        pendingFiles = [...pendingFiles, ...Array.from(e.target.files)];
        renderPreview();
      };
      function logout() {
        localStorage.clear();
        window.location.href = "/login.html";
      }
    </script>
  </body>
</html>
